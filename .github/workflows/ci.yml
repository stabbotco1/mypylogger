name: CI/CD Pipeline

on:
  push:
    branches: [ main, pre-release ]
  pull_request:
    branches: [ main, pre-release ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Code formatting check (Black)
        run: black --check --diff .

      - name: Import sorting check (isort)
        run: isort --check-only --diff .

      - name: Linting (flake8)
        run: flake8 .

      - name: Type checking (mypy)
        run: mypy mypylogger/

      - name: Security linting (Bandit)
        run: bandit -r mypylogger/ -f json -o reports/security/bandit-report.json || true

      - name: Dependency vulnerability scan (Safety)
        run: safety check --json --output reports/security/safety-report.json || true

  test-matrix:
    name: Test Matrix
    runs-on: ${{ matrix.os }}
    needs: quality-gates
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        exclude:
          # Reduce matrix size for faster execution
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.10"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.python-version }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.python-version }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=mypylogger --cov-report=xml --cov-report=term-missing --cov-fail-under=90

  upload-coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest
    needs: test-matrix
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=mypylogger --cov-report=xml --cov-report=term-missing --cov-fail-under=90

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get Codecov token from AWS SSM
        run: |
          CODECOV_TOKEN=$(aws ssm get-parameter \
            --name "/mypylogger/prod/codecov-token" \
            --with-decryption \
            --query Parameter.Value --output text)
          echo "::add-mask::$CODECOV_TOKEN"
          echo "CODECOV_TOKEN=$CODECOV_TOKEN" >> $GITHUB_ENV

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ env.CODECOV_TOKEN }}

  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test-matrix, upload-coverage]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist-packages
          path: dist/

  deploy:
    name: Deploy to PyPI
    runs-on: ubuntu-latest
    needs: build-package
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist-packages
          path: dist/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get PyPI token from AWS SSM
        run: |
          PYPI_TOKEN=$(aws ssm get-parameter \
            --name "/mypylogger/prod/pypi-token" \
            --with-decryption \
            --query Parameter.Value --output text)
          echo "::add-mask::$PYPI_TOKEN"
          echo "PYPI_TOKEN=$PYPI_TOKEN" >> $GITHUB_ENV

      - name: Publish to PyPI
        run: |
          python -m pip install --upgrade pip twine
          python -m twine upload dist/* --username __token__ --password $PYPI_TOKEN

      - name: Post-deployment smoke test
        run: |
          # Wait for PyPI to propagate the package
          sleep 60
          
          # Create clean environment for testing
          python -m venv test_env
          source test_env/bin/activate || test_env\Scripts\activate
          
          # Install from PyPI and test
          pip install mypylogger==${{ github.ref_name }}
          python -c "
          import mypylogger
          logger = mypylogger.get_logger()
          logger.info('Smoke test successful - package deployed correctly')
          print('✅ PyPI deployment verified successfully')
          "

  notify-status:
    name: Notify Pipeline Status
    runs-on: ubuntu-latest
    needs: [quality-gates, test-matrix, upload-coverage, build-package, deploy]
    if: always()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        if: vars.AWS_GITHUB_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check pipeline status and notify
        uses: actions/github-script@v7
        with:
          script: |
            const { context } = require('@actions/core');
            const conclusion = '${{ needs.deploy.result }}' || '${{ needs.build-package.result }}';
            const status = conclusion === 'success' ? '✅ SUCCESS' : '❌ FAILED';
            
            console.log(`Pipeline Status: ${status}`);
            console.log(`Quality Gates: ${{ needs.quality-gates.result }}`);
            console.log(`Test Matrix: ${{ needs.test-matrix.result }}`);
            console.log(`Build Package: ${{ needs.build-package.result }}`);
            console.log(`Deploy: ${{ needs.deploy.result }}`);
            
            // Create issue on failure for visibility
            if (conclusion === 'failure') {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `CI/CD Pipeline Failed - ${context.sha.substring(0, 7)}`,
                body: `
            ## Pipeline Failure Report
            
            **Commit**: ${context.sha}
            **Branch**: ${context.ref}
            **Workflow**: ${context.workflow}
            
            **Job Results**:
            - Quality Gates: ${{ needs.quality-gates.result }}
            - Test Matrix: ${{ needs.test-matrix.result }}
            - Build Package: ${{ needs.build-package.result }}
            - Deploy: ${{ needs.deploy.result }}
            
            **Action Required**: Review failed jobs and fix issues.
            
            [View Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})
                `,
                labels: ['ci/cd', 'bug', 'high-priority']
              });
            }