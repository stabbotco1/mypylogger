name: Automated Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Check for version bump needed
      id: version_check
      run: |
        python scripts/version_bump.py > version_output.txt 2>&1
        if grep -q "New version:" version_output.txt; then
          echo "needs_release=true" >> $GITHUB_OUTPUT
          NEW_VERSION=$(grep "New version:" version_output.txt | cut -d' ' -f3)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version will be bumped to: $NEW_VERSION"
        else
          echo "needs_release=false" >> $GITHUB_OUTPUT
          echo "No version bump needed"
        fi
        cat version_output.txt

    - name: Generate changelog
      if: steps.version_check.outputs.needs_release == 'true'
      run: |
        python scripts/generate_changelog.py ${{ steps.version_check.outputs.new_version }}

    - name: Commit version bump and changelog
      if: steps.version_check.outputs.needs_release == 'true'
      run: |
        git add pyproject.toml mypylogger/__init__.py CHANGELOG.md
        git commit -m "chore: bump version to ${{ steps.version_check.outputs.new_version }} [skip release]"
        git push origin main

    - name: Create and push tag
      if: steps.version_check.outputs.needs_release == 'true'
      run: |
        git tag v${{ steps.version_check.outputs.new_version }}
        git push origin v${{ steps.version_check.outputs.new_version }}

    - name: Build package
      if: steps.version_check.outputs.needs_release == 'true'
      run: python -m build

    - name: Publish to PyPI
      if: steps.version_check.outputs.needs_release == 'true'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine check dist/*
        twine upload dist/*

    - name: Validate release
      if: steps.version_check.outputs.needs_release == 'true'
      run: |
        pip install requests
        python scripts/validate_release.py ${{ steps.version_check.outputs.new_version }}

    - name: Create GitHub Release
      if: steps.version_check.outputs.needs_release == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version_check.outputs.new_version }}
        release_name: Release v${{ steps.version_check.outputs.new_version }}
        body: |
          Automated release v${{ steps.version_check.outputs.new_version }}

          See [CHANGELOG.md](https://github.com/stabbotco1/mypylogger/blob/main/CHANGELOG.md) for details.
        draft: false
        prerelease: false
