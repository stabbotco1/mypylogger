name: Security Scanning

on:
  push:
    branches: [ main, pre-release ]
  pull_request:
    branches: [ main, pre-release ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit safety

      - name: Create reports directory
        run: mkdir -p reports/security

      - name: Run Bandit security scan
        run: |
          bandit -r mypylogger/ -f json -o reports/security/bandit-report.json
          bandit -r mypylogger/ -f txt -o reports/security/bandit-report.txt
        continue-on-error: true

      - name: Run Safety dependency scan
        run: |
          safety check --json --output reports/security/safety-report.json
          safety check --output reports/security/safety-report.txt
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/security/

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  trivy-scan:
    name: Trivy Vulnerability Scanner
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [security-scan, trivy-scan]
    if: always()
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Download security reports
        uses: actions/download-artifact@v4
        with:
          name: security-reports
          path: reports/security/

      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "**Scan Date**: $(date)" >> security-summary.md
          echo "**Repository**: ${{ github.repository }}" >> security-summary.md
          echo "**Commit**: ${{ github.sha }}" >> security-summary.md
          echo "" >> security-summary.md

          # Check Bandit results
          if [ -f "reports/security/bandit-report.json" ]; then
            HIGH_ISSUES=$(jq '[.results[] | select(.issue_severity == "HIGH")] | length' reports/security/bandit-report.json 2>/dev/null || echo "0")
            MEDIUM_ISSUES=$(jq '[.results[] | select(.issue_severity == "MEDIUM")] | length' reports/security/bandit-report.json 2>/dev/null || echo "0")
            echo "## Bandit Results" >> security-summary.md
            echo "- High severity issues: $HIGH_ISSUES" >> security-summary.md
            echo "- Medium severity issues: $MEDIUM_ISSUES" >> security-summary.md
            echo "" >> security-summary.md
          fi

          # Check Safety results
          if [ -f "reports/security/safety-report.json" ]; then
            VULNERABILITIES=$(jq 'length' reports/security/safety-report.json 2>/dev/null || echo "0")
            echo "## Safety Results" >> security-summary.md
            echo "- Dependency vulnerabilities: $VULNERABILITIES" >> security-summary.md
            echo "" >> security-summary.md
          fi

          echo "## Status" >> security-summary.md
          if [ "$HIGH_ISSUES" = "0" ] && [ "$VULNERABILITIES" = "0" ]; then
            echo "✅ No critical security issues found" >> security-summary.md
          else
            echo "⚠️ Security issues detected - review required" >> security-summary.md
          fi

      - name: Upload security summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md

      - name: Comment security summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  update-codeql-readme:
    name: Update CodeQL Status in README
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      security-events: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch CodeQL alerts
        id: codeql-alerts
        uses: actions/github-script@v7
        with:
          script: |
            const alerts = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            let high = 0, warning = 0, note = 0;
            
            for (const alert of alerts.data) {
              if (alert.rule.security_severity_level === 'high' || alert.rule.severity === 'error') {
                high++;
              } else if (alert.rule.security_severity_level === 'medium' || alert.rule.severity === 'warning') {
                warning++;
              } else {
                note++;
              }
            }
            
            core.setOutput('high_count', high);
            core.setOutput('warning_count', warning);
            core.setOutput('note_count', note);
            core.setOutput('total_count', alerts.data.length);

      - name: Update README with CodeQL counts
        run: |
          # Get current date
          CURRENT_DATE=$(date -u '+%Y-%m-%d')
          
          # Update date placeholder
          sed -i "s/CODEQL_UPDATE_DATE_PLACEHOLDER/${CURRENT_DATE}/g" README.md
          
          # Update severity counts using context-anchored patterns
          sed -i '/| \*\*High\*\* |/s/| [0-9]* | Test files/| ${{ steps.codeql-alerts.outputs.high_count }} | Test files/' README.md
          sed -i '/| \*\*Warning\*\* |/s/| [0-9]* | Example code/| ${{ steps.codeql-alerts.outputs.warning_count }} | Example code/' README.md
          sed -i '/| \*\*Note\*\* |/s/| [0-9]* | Scripts/| ${{ steps.codeql-alerts.outputs.note_count }} | Scripts/' README.md

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "Update CodeQL status in README [skip ci]"
          git push
