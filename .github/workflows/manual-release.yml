name: Manual Release to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty for auto-calculate from commits)'
        required: false
        type: string
      skip_tests:
        description: 'Skip test suite (use only if tests already passed in CI)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine bump2version gitpython

      - name: Run test suite
        if: ${{ !inputs.skip_tests }}
        run: |
          pip install -e ".[dev]"
          pytest tests/ --cov=mypylogger --cov-report=term-missing

      - name: Calculate version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Using manual version: $VERSION"
          else
            CURRENT=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
            IFS='.' read -r major minor patch <<< "$CURRENT"
            VERSION="$major.$minor.$((patch + 1))"
            echo "Auto-calculated version: $VERSION (from $CURRENT)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/__version__ = .*/__version__ = \"$VERSION\"/" src/mypylogger/__init__.py
          grep "version = " pyproject.toml
          grep "__version__ = " src/mypylogger/__init__.py

      - name: Generate CHANGELOG entry
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log $LAST_TAG..HEAD --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges)
          fi
          {
            echo "## [$VERSION] - $DATE"
            echo ""
            echo "$COMMITS" | sed 's/^/- /'
            echo ""
            cat CHANGELOG.md
          } > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/mypylogger/__init__.py CHANGELOG.md
          git commit -m "chore: bump version to $VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION"

      - name: Push changes and tags
        run: |
          git push origin main
          git push origin --tags

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          twine check dist/*
          pip install dist/*.whl
          python -c "import mypylogger; print(f'Installed version: {mypylogger.__version__}')"

      - name: Publish to PyPI
        uses: pypa
/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: dist/*
          draft: false
          prerelease: false

      - name: Verify PyPI publication
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting 30s for PyPI to propagate..."
          sleep 30
          pip install --index-url https://pypi.org/simple/ --upgrade mypylogger==$VERSION
          python -c "import mypylogger; assert mypylogger.__version__ == '$VERSION'"
