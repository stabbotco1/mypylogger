name: Badge Health Check

on:
  # Run on pushes to main branches
  push:
    branches: [ main, pre-release ]

  # Run on pull requests
  pull_request:
    branches: [ main, pre-release ]

  # Run daily at 6 AM UTC to catch badge service issues
  schedule:
    - cron: '0 6 * * *'

  # Allow manual triggering
  workflow_dispatch:

jobs:
  badge-health-check:
    name: Badge Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run badge health check
        id: badge-check
        run: |
          python scripts/badge_health_monitor.py \
            --format github-actions \
            --timeout 15 \
            --verbose
        continue-on-error: true

      - name: Run detailed badge validation
        if: always()
        run: |
          echo "## Badge Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run validation and capture output
          python scripts/validate_badges.py --verbose > badge_report.txt 2>&1 || true

          # Add to step summary
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat badge_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload badge report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-health-report
          path: badge_report.txt
          retention-days: 30

      - name: Create issue on badge failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Badge Health Check Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `
            ## Badge Health Check Failure

            The automated badge health check has detected issues with one or more badges.

            **Workflow Run**: [${context.runId}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            **Triggered**: Scheduled daily check
            **Date**: ${new Date().toISOString()}

            ## Next Steps

            1. Review the workflow logs for specific badge failures
            2. Check if badge services (Shields.io, PyPI, etc.) are experiencing issues
            3. Verify that linked resources (GitHub Actions, Codecov, etc.) are accessible
            4. Update badge URLs if necessary

            ## Badge Validation Commands

            Run locally to debug:
            \`\`\`bash
            python scripts/validate_badges.py --verbose
            python scripts/badge_health_monitor.py --format json
            \`\`\`

            This issue will be automatically closed when the next scheduled check passes.
            `;

            // Check if there's already an open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['badge-health', 'automated']
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes('Badge Health Check Failed')
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['badge-health', 'automated', 'bug']
              });
            }

      - name: Close badge health issues on success
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            // Find open badge health issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['badge-health', 'automated']
            });

            // Close them with a success comment
            for (const issue of issues.data) {
              if (issue.title.includes('Badge Health Check Failed')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ Badge health check is now passing. Closing this automated issue.

                  **Resolved**: ${new Date().toISOString()}
                  **Workflow Run**: [${context.runId}](${context.payload.repository.html_url}/actions/runs/${context.runId})`
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
              }
            }
