name: Performance Badge Update

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'  # Weekly, Sunday 3 AM UTC
  workflow_dispatch:

permissions:
  contents: write  # Required for committing badge updates

jobs:
  performance-test:
    name: Performance Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install psutil

      - name: Run performance benchmarks
        id: perf-test
        run: |
          echo "Running performance benchmarks on ${{ matrix.os }}..."
          
          python scripts/measure_performance.py --json > performance_results.json
          
          LATENCY=$(python -c "
          import json
          with open('performance_results.json') as f:
              data = json.load(f)
          print(f\"{data['latency']['average_ms']:.3f}\")
          ")

          THROUGHPUT=$(python -c "
          import json
          with open('performance_results.json') as f:
              data = json.load(f)
          throughput = data['throughput']['logs_per_second']
          print(f\"{throughput/1000:.0f}\" if throughput >= 1000 else f\"{throughput:.0f}\")
          ")

          echo "latency=${LATENCY}" >> $GITHUB_OUTPUT
          echo "throughput=${THROUGHPUT}" >> $GITHUB_OUTPUT

          echo "## Performance Results (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Latency**: ${LATENCY}ms average" >> $GITHUB_STEP_SUMMARY
          echo "- **Throughput**: ${THROUGHPUT}K logs/second" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Save performance metrics
        run: |
          # Create a simple text file with the metrics for the aggregation job
          echo "os=${{ matrix.os }}" > perf_metrics_${{ matrix.os }}.txt
          echo "latency=${{ steps.perf-test.outputs.latency }}" >> perf_metrics_${{ matrix.os }}.txt
          echo "throughput=${{ steps.perf-test.outputs.throughput }}" >> perf_metrics_${{ matrix.os }}.txt

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ matrix.os }}
          path: |
            performance_results.json
            perf_metrics_${{ matrix.os }}.txt
          retention-days: 30

  update-badges:
    name: Update All Performance Badges
    needs: performance-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper git operations

      - name: Download Ubuntu performance results
        uses: actions/download-artifact@v4
        with:
          name: performance-results-ubuntu-latest
          path: ./results/ubuntu

      - name: Download macOS performance results
        uses: actions/download-artifact@v4
        with:
          name: performance-results-macos-latest
          path: ./results/macos

      - name: Extract performance metrics
        id: metrics
        run: |
          # Extract Ubuntu metrics
          UBUNTU_LATENCY=$(grep "latency=" ./results/ubuntu/perf_metrics_ubuntu-latest.txt | cut -d'=' -f2)
          UBUNTU_THROUGHPUT=$(grep "throughput=" ./results/ubuntu/perf_metrics_ubuntu-latest.txt | cut -d'=' -f2)
          
          # Extract macOS metrics
          MACOS_LATENCY=$(grep "latency=" ./results/macos/perf_metrics_macos-latest.txt | cut -d'=' -f2)
          MACOS_THROUGHPUT=$(grep "throughput=" ./results/macos/perf_metrics_macos-latest.txt | cut -d'=' -f2)
          
          echo "ubuntu_latency=${UBUNTU_LATENCY}" >> $GITHUB_OUTPUT
          echo "ubuntu_throughput=${UBUNTU_THROUGHPUT}" >> $GITHUB_OUTPUT
          echo "macos_latency=${MACOS_LATENCY}" >> $GITHUB_OUTPUT
          echo "macos_throughput=${MACOS_THROUGHPUT}" >> $GITHUB_OUTPUT
          
          echo "📊 Extracted Metrics:"
          echo "  Ubuntu: ${UBUNTU_LATENCY}ms, ${UBUNTU_THROUGHPUT}K/sec"
          echo "  macOS: ${MACOS_LATENCY}ms, ${MACOS_THROUGHPUT}K/sec"

      - name: Update all performance badges
        run: |
          # Update Ubuntu badge
          UBUNTU_PERF_TEXT="${{ steps.metrics.outputs.ubuntu_latency }}ms,%20${{ steps.metrics.outputs.ubuntu_throughput }}K/sec"
          sed -i "s|Ubuntu-[^-]*ms,%20[^-]*K/sec|Ubuntu-${UBUNTU_PERF_TEXT}|g" README.md
          
          # Update macOS badge
          MACOS_PERF_TEXT="${{ steps.metrics.outputs.macos_latency }}ms,%20${{ steps.metrics.outputs.macos_throughput }}K/sec"
          sed -i "s|macOS-[^-]*ms,%20[^-]*K/sec|macOS-${MACOS_PERF_TEXT}|g" README.md
          
          echo "✅ Updated both Ubuntu and macOS performance badges"

      - name: Commit and push badge updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if git diff --quiet README.md; then
            echo "No badge updates needed"
          else
            git add README.md
            git commit -m "Update performance badges [skip ci]

            Ubuntu Performance:
            - Latency: ${{ steps.metrics.outputs.ubuntu_latency }}ms
            - Throughput: ${{ steps.metrics.outputs.ubuntu_throughput }}K/sec
            
            macOS Performance:
            - Latency: ${{ steps.metrics.outputs.macos_latency }}ms
            - Throughput: ${{ steps.metrics.outputs.macos_throughput }}K/sec"
            
            git push
            
            echo "✅ Performance badges updated and committed"
          fi

      - name: Create summary
        run: |
          echo "## 🎯 Performance Badge Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ubuntu Performance" >> $GITHUB_STEP_SUMMARY
          echo "- **Latency**: ${{ steps.metrics.outputs.ubuntu_latency }}ms" >> $GITHUB_STEP_SUMMARY
          echo "- **Throughput**: ${{ steps.metrics.outputs.ubuntu_throughput }}K logs/second" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### macOS Performance" >> $GITHUB_STEP_SUMMARY
          echo "- **Latency**: ${{ steps.metrics.outputs.macos_latency }}ms" >> $GITHUB_STEP_SUMMARY
          echo "- **Throughput**: ${{ steps.metrics.outputs.macos_throughput }}K logs/second" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All badges updated in single commit - no race conditions!" >> $GITHUB_STEP_SUMMARY
