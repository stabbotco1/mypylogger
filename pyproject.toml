[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mypylogger"
version = "0.1.0a1"
description = "Production-ready Python logging library with structured JSON output, environment-driven configuration, and real-time development support"
authors = [{name = "Stephen Abbot", email = "stephen.abbot@example.com"}]
license = "MIT"
readme = "README.md"
requires-python = ">=3.8"
keywords = ["logging", "json", "structured-logging", "python", "production", "environment-config"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",

    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Logging",
    "Topic :: System :: Systems Administration",
    "Typing :: Typed"
]

dependencies = [
    "python-json-logger>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/stabbotco1/mypylogger"
Repository = "https://github.com/stabbotco1/mypylogger"
Documentation = "https://github.com/stabbotco1/mypylogger#readme"
"Bug Tracker" = "https://github.com/stabbotco1/mypylogger/issues"
"Security" = "https://github.com/stabbotco1/mypylogger/blob/main/VULNERABILITIES.md"

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.0.0",
    "bandit>=1.7.0",
    "safety>=2.3.0",
    "pre-commit>=3.0.0",
    "build>=0.10.0",
    "twine>=4.0.0"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["mypylogger*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=mypylogger --cov-report=term-missing"