[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mypylogger"
version = "0.1.0"
description = "Production-quality Python logging library with structured JSON logging"
authors = [{name = "Stephen Abbot", email = "stephen.abbot@example.com"}]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "python-json-logger>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/stabbotco1/mypylogger"
Repository = "https://github.com/stabbotco1/mypylogger"
Documentation = "https://github.com/stabbotco1/mypylogger#readme"
"Bug Tracker" = "https://github.com/stabbotco1/mypylogger/issues"
"Security" = "https://github.com/stabbotco1/mypylogger/blob/main/VULNERABILITIES.md"

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["mypylogger*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=mypylogger --cov-report=term-missing"