# Quality Assurance Configuration for mypylogger
# This file defines quality standards and thresholds for automated checks

quality_standards:
  # Code coverage requirements
  coverage:
    minimum_percentage: 90
    fail_under: 90
    exclude_files:
      - "*/tests/*"
      - "*/test_*"
      - "*/__pycache__/*"
      - "*/venv/*"
      - "*/build/*"
      - "*/dist/*"
    
  # Performance requirements
  performance:
    latency:
      max_avg_ms: 0.5
      max_p95_ms: 1.0
      max_p99_ms: 2.0
    throughput:
      min_logs_per_second: 10000
      min_concurrent_logs_per_second: 5000
    memory:
      max_baseline_increase_mb: 50
      max_per_1k_logs_mb: 5
    
  # Code quality thresholds
  code_quality:
    max_complexity: 10
    max_line_length: 88
    max_function_length: 50
    max_class_length: 200
    
  # Security requirements
  security:
    bandit:
      max_high_severity: 0
      max_medium_severity: 0
      allowed_skips:
        - "B101"  # assert_used (acceptable in tests)
    safety:
      max_vulnerabilities: 0
      ignore_ids: []  # CVE IDs to temporarily ignore
      
  # Type checking requirements
  type_checking:
    mypy_strict: true
    min_type_coverage: 95
    disallow_untyped_defs: true
    
# Quality gates for different environments
quality_gates:
  local_development:
    required_checks:
      - "format_check"
      - "lint_check"
      - "type_check"
      - "unit_tests"
      - "coverage_check"
    optional_checks:
      - "security_scan"
      - "performance_tests"
      
  pull_request:
    required_checks:
      - "format_check"
      - "lint_check" 
      - "type_check"
      - "security_scan"
      - "unit_tests"
      - "integration_tests"
      - "coverage_check"
    optional_checks:
      - "performance_tests"
      
  pre_release:
    required_checks:
      - "format_check"
      - "lint_check"
      - "type_check"
      - "security_scan"
      - "unit_tests"
      - "integration_tests"
      - "performance_tests"
      - "coverage_check"
      - "build_check"
      - "package_check"
      
# Tool configurations
tools:
  pytest:
    timeout: 300  # 5 minutes max for test suite
    parallel_workers: auto
    
  black:
    line_length: 88
    target_version: "py38"
    
  isort:
    profile: "black"
    multi_line_output: 3
    
  flake8:
    max_line_length: 88
    ignore:
      - "E203"  # whitespace before ':'
      - "W503"  # line break before binary operator
      - "E501"  # line too long (handled by black)
      
  mypy:
    python_version: "3.8"
    strict: true
    
  bandit:
    exclude_dirs:
      - "tests"
      - "build"
      - "dist"
    confidence_level: "medium"
    severity_level: "medium"
    
# Continuous monitoring
monitoring:
  performance_trends:
    track_metrics:
      - "avg_latency_ms"
      - "p95_latency_ms"
      - "throughput_logs_per_sec"
      - "memory_usage_mb"
    alert_thresholds:
      latency_regression_percent: 20
      throughput_regression_percent: 15
      memory_increase_percent: 25
      
  quality_trends:
    track_metrics:
      - "test_coverage_percent"
      - "type_coverage_percent"
      - "security_issues_count"
      - "code_complexity_avg"
    alert_thresholds:
      coverage_drop_percent: 5
      complexity_increase_percent: 10